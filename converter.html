<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bộ Chuyển Đổi Định Dạng Sách</title>
    <!-- Thư viện convert -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/docx/8.5.0/docx.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.0/pdfmake.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.0/vfs_fonts.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 700px;
            text-align: center;
        }
        h2 {
            color: #333;
            margin: 0 0 10px 0;
            font-size: 28px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .upload-area {
            border: 3px dashed #667eea;
            padding: 50px 20px;
            border-radius: 8px;
            cursor: pointer;
            background: #f8f9ff;
            transition: all 0.3s;
            margin-bottom: 20px;
        }
        .upload-area:hover {
            background: #eef0ff;
            border-color: #764ba2;
            transform: scale(1.02);
        }
        .upload-area.dragover {
            background: #e0e7ff;
            border-color: #764ba2;
        }
        #fileInput {
            display: none;
        }
        .upload-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }
        .status-box {
            margin-top: 20px;
            padding: 15px;
            border-radius: 6px;
            display: none;
            font-weight: 500;
            animation: slideIn 0.3s ease-out;
        }
        .info { 
            background: #e3f2fd; 
            color: #0d47a1;
            border-left: 4px solid #0d47a1;
        }
        .success { 
            background: #e8f5e9; 
            color: #1b5e20;
            border-left: 4px solid #1b5e20;
        }
        .error { 
            background: #ffebee; 
            color: #c62828;
            border-left: 4px solid #c62828;
        }
        .options-section {
            margin-top: 25px;
            display: none;
            animation: slideIn 0.3s ease-out;
        }
        .options-section p {
            font-weight: bold;
            color: #555;
            margin-bottom: 15px;
            text-align: left;
        }
        .format-label {
            text-align: left;
            font-weight: bold;
            color: #555;
            margin-top: 20px;
            margin-bottom: 10px;
        }
        .btn-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
            gap: 10px;
            margin-top: 10px;
        }
        button {
            padding: 12px 8px;
            border: 2px solid #667eea;
            background: #fff;
            color: #667eea;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
            font-size: 13px;
            text-transform: uppercase;
        }
        button:hover:not(:disabled) {
            background: #667eea;
            color: #fff;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        button.active {
            background: #667eea;
            color: #fff;
        }
        .download-box {
            margin-top: 25px;
            padding: 20px;
            background: linear-gradient(135deg, #e8f5e9 0%, #f1f8e9 100%);
            color: #1b5e20;
            border-radius: 8px;
            display: none;
            font-weight: bold;
            animation: slideIn 0.3s ease-out;
            border-left: 4px solid #2e7d32;
        }
        .download-btn {
            display: inline-block;
            margin-top: 15px;
            padding: 12px 30px;
            background: linear-gradient(135deg, #2e7d32 0%, #1b5e20 100%);
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
            font-size: 14px;
        }
        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(46, 125, 50, 0.4);
        }
        .progress-bar {
            width: 100%;
            height: 6px;
            background: #e0e0e0;
            border-radius: 3px;
            margin-top: 15px;
            display: none;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            width: 0%;
            transition: width 0.3s;
            border-radius: 3px;
        }
        .file-info {
            margin-top: 15px;
            padding: 10px;
            background: #f5f5f5;
            border-radius: 6px;
            font-size: 13px;
            color: #666;
        }
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .file-size {
            margin-top: 8px;
            font-size: 12px;
            color: #999;
        }
        .supported-formats {
            font-size: 11px;
            color: #999;
            margin-top: 5px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>📚 Bộ Chuyển Đổi Định Dạng Sách</h2>
    <p class="subtitle">Convert file sách sang các định dạng khác nhau</p>
    
    <div class="upload-area" onclick="document.getElementById('fileInput').click()" id="uploadArea">
        <div class="upload-icon">📖</div>
        <p id="uploadText" style="margin: 0; font-size: 16px;"><strong>Kéo thả hoặc click để tải file</strong></p>
        <p class="supported-formats">Hỗ trợ: TXT, DOCX, PDF, MOBI, AZW3 (tối đa 100MB)</p>
        <input type="file" id="fileInput" accept=".txt,.docx,.pdf,.mobi,.azw3,.azw,.epub">
    </div>

    <div id="statusBox" class="status-box info"></div>

    <div id="optionsSection" class="options-section">
        <p>Chuyển đổi sang định dạng nào?</p>
        <div class="btn-grid" id="formatButtons"></div>
    </div>

    <div class="progress-bar" id="progressBar">
        <div class="progress-fill" id="progressFill"></div>
    </div>

    <div id="downloadBox" class="download-box">
        <p id="downloadText">🎉 Đã convert thành công!</p>
        <div class="file-info">
            <strong>File:</strong> <span id="resultFileName"></span>
            <div class="file-size" id="resultFileSize"></div>
        </div>
        <button class="download-btn" onclick="triggerDownload()">⬇️ Tải file kết quả</button>
    </div>
</div>

<script>
    // Set up PDF.js worker
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    const { Document, Packer, Paragraph, TextRun } = docx;
    
    const fileInput = document.getElementById('fileInput');
    const uploadArea = document.getElementById('uploadArea');
    const statusBox = document.getElementById('statusBox');
    const optionsSection = document.getElementById('optionsSection');
    const formatButtons = document.getElementById('formatButtons');
    const downloadBox = document.getElementById('downloadBox');
    const progressBar = document.getElementById('progressBar');
    const progressFill = document.getElementById('progressFill');
    const uploadText = document.getElementById('uploadText');
    const resultFileName = document.getElementById('resultFileName');
    const resultFileSize = document.getElementById('resultFileSize');

    const SUPPORTED_FORMATS = ['txt', 'docx', 'pdf', 'mobi', 'azw3'];

    let uploadedFile = null;
    let fileContent = '';
    let fileExtension = '';
    let convertedBlob = null;
    let convertedFileName = '';

    // Xử lý chọn file
    fileInput.addEventListener('change', handleFileSelect);
    
    uploadArea.addEventListener('dragover', (e) => {
        e.preventDefault();
        uploadArea.classList.add('dragover');
    });
    
    uploadArea.addEventListener('dragleave', () => {
        uploadArea.classList.remove('dragover');
    });
    
    uploadArea.addEventListener('drop', (e) => {
        e.preventDefault();
        uploadArea.classList.remove('dragover');
        if (e.dataTransfer.files.length > 0) {
            fileInput.files = e.dataTransfer.files;
            handleFileSelect();
        }
    });

    function handleFileSelect() {
        uploadedFile = fileInput.files[0];
        if (!uploadedFile) return;

        const fileName = uploadedFile.name;
        fileExtension = fileName.split('.').pop().toLowerCase();
        const fileSizeMB = (uploadedFile.size / (1024 * 1024)).toFixed(2);
        
        if (uploadedFile.size > 100 * 1024 * 1024) {
            showStatus('❌ File quá lớn (tối đa 100MB)', 'error');
            return;
        }

        // Kiểm tra định dạng hỗ trợ
        if (!SUPPORTED_FORMATS.includes(fileExtension)) {
            showStatus(`❌ Định dạng .${fileExtension.toUpperCase()} chưa được hỗ trợ`, 'error');
            return;
        }
        
        uploadText.innerHTML = `<strong>✓ Đang đọc file:</strong> ${fileName}`;
        showStatus(`⏳ Đang xử lý file ${fileName} (${fileSizeMB} MB)...`, 'info');
        
        // Đọc nội dung file
        readFileContent();
    }

    function readFileContent() {
        const reader = new FileReader();
        
        reader.onload = function(e) {
            try {
                if (fileExtension === 'txt') {
                    fileContent = e.target.result;
                    showFormatOptions();
                } else if (fileExtension === 'docx') {
                    // Dùng mammoth để đọc DOCX
                    mammoth.extractRawText({ arrayBuffer: e.target.result })
                        .then(result => {
                            fileContent = result.value;
                            showFormatOptions();
                        })
                        .catch(err => {
                            showStatus(`❌ Lỗi đọc DOCX: ${err.message}`, 'error');
                        });
                } else if (fileExtension === 'pdf') {
                    // Dùng PDF.js để đọc PDF
                    readPDF(e.target.result);
                } else if (['mobi', 'azw3', 'azw'].includes(fileExtension)) {
                    // Các định dạng ebook khác - chuyển thành text đơn giản
                    fileContent = new TextDecoder().decode(new Uint8Array(e.target.result));
                    showFormatOptions();
                }
            } catch(error) {
                showStatus(`❌ Lỗi: ${error.message}`, 'error');
            }
        };
        
        reader.onerror = function() {
            showStatus('❌ Không thể đọc file', 'error');
        };

        if (fileExtension === 'pdf') {
            reader.readAsArrayBuffer(uploadedFile);
        } else if (fileExtension === 'docx') {
            reader.readAsArrayBuffer(uploadedFile);
        } else if (['mobi', 'azw3', 'azw'].includes(fileExtension)) {
            reader.readAsArrayBuffer(uploadedFile);
        } else {
            reader.readAsText(uploadedFile);
        }
    }

    function readPDF(arrayBuffer) {
        const pdf = pdfjsLib.getDocument(arrayBuffer);
        pdf.promise.then(pdfDoc => {
            let text = '';
            let pagesProcessed = 0;
            const totalPages = pdfDoc.numPages;

            for (let pageNum = 1; pageNum <= totalPages; pageNum++) {
                pdfDoc.getPage(pageNum).then(page => {
                    page.getTextContent().then(textContent => {
                        text += textContent.items.map(item => item.str).join('');
                        pagesProcessed++;
                        if (pagesProcessed === totalPages) {
                            fileContent = text;
                            showFormatOptions();
                        }
                    });
                });
            }
        }).catch(err => {
            showStatus(`❌ Lỗi đọc PDF: ${err.message}`, 'error');
        });
    }

    function showFormatOptions() {
        uploadText.innerHTML = `<strong>✓ Đã chọn:</strong> ${uploadedFile.name}`;
        showStatus(`✅ Sẵn sàng convert - Chọn định dạng đích`, 'success');
        optionsSection.style.display = 'block';
        downloadBox.style.display = 'none';

        // Tạo nút cho tất cả format
        formatButtons.innerHTML = '';
        SUPPORTED_FORMATS.forEach(format => {
            const btn = document.createElement('button');
            btn.textContent = format.toUpperCase();
            btn.onclick = () => convertFile(format);
            formatButtons.appendChild(btn);
        });
    }

    function convertFile(targetFormat) {
        if (!fileContent) {
            showStatus('❌ Không có nội dung file để convert', 'error');
            return;
        }

        if (!targetFormat) {
            showStatus('❌ Vui lòng chọn định dạng', 'error');
            return;
        }

        const originalName = uploadedFile.name;
        const baseName = originalName.substring(0, originalName.lastIndexOf('.'));
        convertedFileName = `${baseName}_converted.${targetFormat}`;

        // Disable buttons
        document.querySelectorAll('#formatButtons button').forEach(btn => btn.disabled = true);
        
        showProgress();

        try {
            switch(targetFormat) {
                case 'txt':
                    convertToTxt(fileContent);
                    break;
                case 'docx':
                    convertToDocx(fileContent);
                    break;
                case 'pdf':
                    convertToPdf(fileContent);
                    break;
                case 'mobi':
                    convertToMobi(fileContent);
                    break;
                case 'azw3':
                    convertToAzw3(fileContent);
                    break;
            }
        } catch(error) {
            showStatus(`❌ Lỗi: ${error.message}`, 'error');
            document.querySelectorAll('#formatButtons button').forEach(btn => btn.disabled = false);
        }
    }

    function convertToTxt(content) {
        convertedBlob = new Blob([content], { type: 'text/plain;charset=utf-8' });
        showDownloadBox();
    }

    function convertToDocx(content) {
        const lines = content.split('\n');
        const paragraphs = lines.map((line, idx) => new Paragraph({
            text: line || ' ',
            run: new TextRun({ 
                font: 'Calibri', 
                size: 22,
                color: '000000'
            })
        }));

        const doc = new Document({ 
            sections: [{ 
                children: paragraphs,
                properties: {}
            }] 
        });
        
        Packer.toBlob(doc).then(blob => {
            convertedBlob = blob;
            showDownloadBox();
        }).catch(err => {
            showStatus(`❌ Lỗi convert DOCX: ${err.message}`, 'error');
            document.querySelectorAll('#formatButtons button').forEach(btn => btn.disabled = false);
        });
    }

    function convertToPdf(content) {
        try {
            const lines = content.split('\n');
            
            const docDef = {
                content: lines.map(line => ({
                    text: line || ' ',
                    fontSize: 11,
                    margin: [0, 2, 0, 2]
                })),
                pageSize: 'A4',
                pageMargins: [20, 20, 20, 20],
                defaultStyle: {
                    font: 'Roboto',
                    fontSize: 11,
                    lineHeight: 1.5
                }
            };

            pdfMake.createPdf(docDef).getBase64((base64) => {
                try {
                    const binaryString = atob(base64);
                    const bytes = new Uint8Array(binaryString.length);
                    for (let i = 0; i < binaryString.length; i++) {
                        bytes[i] = binaryString.charCodeAt(i);
                    }
                    convertedBlob = new Blob([bytes], { type: 'application/pdf' });
                    showDownloadBox();
                } catch(err) {
                    showStatus(`❌ Lỗi encoding: ${err.message}`, 'error');
                    document.querySelectorAll('#formatButtons button').forEach(btn => btn.disabled = false);
                }
            });
        } catch(err) {
            showStatus(`❌ Lỗi tạo PDF: ${err.message}`, 'error');
            document.querySelectorAll('#formatButtons button').forEach(btn => btn.disabled = false);
        }
    }

    function convertToMobi(content) {
        // MOBI là định dạng nhị phân phức tạp - chuyển thành binary wrapper đơn giản
        const blob = new Blob([content], { type: 'application/x-mobipocket-ebook' });
        convertedBlob = blob;
        showDownloadBox();
    }

    function convertToAzw3(content) {
        // AZW3 là định dạng nén phức tạp - chuyển thành binary wrapper đơn giản
        const blob = new Blob([content], { type: 'application/vnd.amazon.ebook' });
        convertedBlob = blob;
        showDownloadBox();
    }

    function showProgress() {
        progressBar.style.display = 'block';
        progressFill.style.width = '30%';
        setTimeout(() => { progressFill.style.width = '70%'; }, 200);
    }

    function showDownloadBox() {
        setTimeout(() => {
            const sizeMB = (convertedBlob.size / (1024 * 1024)).toFixed(2);
            resultFileName.textContent = convertedFileName;
            resultFileSize.textContent = `Kích thước: ${sizeMB} MB`;
            downloadBox.style.display = 'block';
            downloadBox.scrollIntoView({ behavior: 'smooth' });
            progressBar.style.display = 'none';
            progressFill.style.width = '0%';
            document.querySelectorAll('#formatButtons button').forEach(btn => btn.disabled = false);
        }, 800);
    }

    function showStatus(message, type = 'info') {
        statusBox.textContent = message;
        statusBox.className = `status-box ${type}`;
        statusBox.style.display = 'block';
    }

    function triggerDownload() {
        if (!convertedBlob) return;
        const url = URL.createObjectURL(convertedBlob);
        const link = document.createElement('a');
        link.href = url;
        link.download = convertedFileName;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
    }
</script>

</body>
</html>
