<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tool Thêm Truyện Bảo Mật</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #a29bfe 0%, #fd79a8 100%);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            min-height: 100vh;
        }

        .form-card {
            background: rgba(255, 255, 255, 0.9);
            padding: 35px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
            backdrop-filter: blur(10px);
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        h2 {
            font-family: 'Comfortaa', cursive;
            text-align: center;
            color: #6c5ce7;
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            color: #4834d4;
        }

        input[type="text"], textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0ece4;
            border-radius: 12px;
            font-size: 1rem;
            font-family: 'Nunito', sans-serif;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        input:focus, textarea:focus {
            border-color: #6c5ce7;
            outline: none;
            box-shadow: 0 0 10px rgba(108, 92, 231, 0.2);
            background: white;
        }

        /* Nút Send phát sáng ảo diệu */
        .btn-send {
            width: 100%;
            padding: 14px;
            background: linear-gradient(45deg, #6c5ce7, #fd79a8);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            font-family: 'Comfortaa', cursive;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(253, 121, 168, 0.4);
            transition: all 0.4s ease;
            margin-top: 10px;
        }

        .btn-send:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(108, 92, 231, 0.6);
            letter-spacing: 1px;
        }

        /* Khu vực hiển thị kết quả JSON */
        .result-box {
            margin-top: 25px;
            background: #2d3436;
            color: #00ff88;
            padding: 15px;
            border-radius: 12px;
            font-family: monospace;
            font-size: 0.85rem;
            white-space: pre-wrap;
            display: none;
            border: 1px solid #6c5ce7;
        }

        .copy-notice {
            color: white;
            background: #20bf6b;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            margin-top: 15px;
            display: none;
            font-weight: 600;
        }

        @keyframes popIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

<div class="form-card">
    <h2>✿ Thêm Truyện Mới ✿</h2>
    <form id="addStoryForm">
        <div class="form-group">
            <label>Tên truyện:</label>
            <input type="text" id="ten" required placeholder="Ví dụ: Thụ sủng công vô địch">
        </div>
        <div class="form-group">
            <label>Tác giả:</label>
            <input type="text" id="tacGia" required placeholder="Tên tác giả...">
        </div>
        <div class="form-group">
            <label>Thể loại (Cách nhau bằng dấu phẩy):</label>
            <input type="text" id="theLoai" required placeholder="Sủng công, Đam mỹ, Hiện đại...">
        </div>
        <div class="form-group">
            <label>Ghi chú thích:</label>
            <textarea id="ghiChu" rows="2" placeholder="Nhập review ngắn hoặc lưu ý..."></textarea>
        </div>
        <div class="form-group">
            <label>Link Tải Raw (Drive/Mediafire):</label>
            <input type="text" id="linkRaw" required placeholder="https://...">
        </div>
        <div class="form-group">
            <label>Link Tải QT (Drive/Mediafire):</label>
            <input type="text" id="linkQT" required placeholder="https://...">
        </div>
        <button type="submit" class="btn-send">Tạo Mã Truyện ✨</button>
    </form>

    <div class="copy-notice" id="copyNotice">Đã copy đoạn mã! Hãy mở file json ra dán vào nha bà!</div>
    <div class="result-box" id="resultBox"></div>
</div>

<script>
    document.getElementById('addStoryForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        // Lấy dữ liệu từ form
        const story = {
            id: Date.now(), // Dùng thời gian làm ID ngẫu nhiên đảm bảo tăng dần
            ten: document.getElementById('ten').value,
            tacGia: document.getElementById('tacGia').value,
            theLoai: document.getElementById('theLoai').value,
            ghiChu: document.getElementById('ghiChu').value,
            linkRaw: document.getElementById('linkRaw').value,
            linkQT: document.getElementById('linkQT').value
        };

        // Chuyển sang chuỗi định dạng JSON mẫu để dễ chép
        const jsonString = JSON.stringify(story, null, 2);
        
        // Hiển thị khối kết quả
        const resultBox = document.getElementById('resultBox');
        resultBox.style.display = 'block';
        resultBox.innerText = `,\n${jsonString}`; // Thêm dấu phẩy ở đầu để dễ nối đuôi vào file cũ

        // Tự động copy luôn vào khay nhớ tạm (Clipboard) cho bạn đỡ mỏi tay
        navigator.clipboard.writeText(`,\n${jsonString}`).then(() => {
            const notice = document.getElementById('copyNotice');
            notice.style.display = 'block';
            setTimeout(() => { notice.style.display = 'none'; }, 4000);
        });

        // Xóa sạch form để sẵn sàng nhập truyện tiếp theo
        document.getElementById('addStoryForm').reset();
    });
</script>
</body>
</html>
