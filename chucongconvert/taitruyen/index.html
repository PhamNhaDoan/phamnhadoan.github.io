<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kho Tải Truyện Sủng Công - ChuCongConvert</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@500;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #fdfcfb 0%, #e2d1c3 100%);
            --primary-purple: #7451eb;
            --secondary-pink: #ff758c;
            --raw-glow: linear-gradient(135deg, #ff416c, #ff4b2b);
            --qt-glow: linear-gradient(135deg, #00c6ff, #0072ff);
            --text-dark: #333333;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-dark);
            margin: 0;
            padding: 50px 20px;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Container kính mờ sang trọng, bay bổng */
        .main-wrapper {
            max-width: 1250px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.75);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(181, 129, 108, 0.15);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            animation: floatUp 1.2s ease-out;
        }

        h1 {
            font-family: 'Comfortaa', cursive;
            text-align: center;
            background: linear-gradient(45deg, var(--primary-purple), var(--secondary-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
            font-size: 2.5rem;
            letter-spacing: 1px;
        }

        .subtitle {
            text-align: center;
            color: #8e8d8a;
            font-style: italic;
            margin-bottom: 40px;
            font-size: 0.95rem;
        }

        /* Thanh tìm kiếm phát sáng */
        .search-container {
            position: relative;
            max-width: 450px;
            margin: 0 auto 40px auto;
        }

        .search-input {
            width: 100%;
            padding: 14px 25px;
            font-size: 1rem;
            border: 2px solid rgba(116, 81, 235, 0.2);
            border-radius: 50px;
            outline: none;
            background: rgba(255, 255, 255, 0.9);
            color: var(--text-dark);
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            font-family: 'Nunito', sans-serif;
            box-shadow: 0 5px 15px rgba(0,0,0,0.02);
        }

        .search-input:focus {
            border-color: var(--primary-purple);
            box-shadow: 0 10px 25px rgba(116, 81, 235, 0.15);
            transform: translateY(-2px);
        }

        /* Bảng danh sách truyện nổi khối */
        .table-container {
            overflow-x: auto;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            background: white;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background: linear-gradient(90deg, #7451eb, #977ef2);
            color: white;
            font-family: 'Comfortaa', cursive;
            font-weight: 700;
            padding: 20px;
            font-size: 1rem;
            letter-spacing: 0.5px;
        }

        td {
            padding: 20px;
            border-bottom: 1px solid #f0edf5;
            font-size: 0.95rem;
            vertical-align: middle;
        }

        /* Hiệu ứng lướt qua hàng cực mượt */
        tr {
            transition: all 0.35s ease;
        }

        tr:hover {
            background-color: rgba(116, 81, 235, 0.04);
            transform: scale(1.005) translateX(4px);
        }

        .story-title {
            font-weight: 700;
            color: #4a34a8;
            font-size: 1.05rem;
        }

        .author-name {
            color: #555555;
            font-weight: 600;
        }

        /* BIẾN TAG THỂ LOẠI THÀNH NÚT BẤM DỄ THƯƠNG SANG CHẢNH */
        .genre-tag {
            background: rgba(255, 117, 140, 0.1);
            color: var(--secondary-pink);
            padding: 5px 14px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 700;
            display: inline-block;
            margin: 3px;
            border: 1px solid rgba(255, 117, 140, 0.15);
            cursor: pointer;
            transition: all 0.3s ease;
            user-select: none; /* Tránh bôi đen chữ khi bấm nhanh */
        }

        /* Hiệu ứng khi rê chuột vào nút thể loại */
        .genre-tag:hover {
            background: var(--secondary-pink);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(255, 117, 140, 0.3);
        }

        /* Hiệu ứng khi nhấn giữ nút thể loại */
        .genre-tag:active {
            transform: translateY(0);
        }

        .notes-text {
            color: #777777;
            font-size: 0.9rem;
            line-height: 1.4;
        }
