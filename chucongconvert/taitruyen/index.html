<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kho Tải Truyện Sủng Công - ChuCongConvert</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@500;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #faf9f6; /* Nền trắng kem cao cấp, dịu mắt */
            --primary-purple: #6c5ce7;
            --text-dark: #2d3436;
            --text-muted: #636e72;
            --border-color: #f1f2f6;
            --raw-color: #ff4757;
            --qt-color: #2f3542; /* Màu QT tối lịch lãm, sang trọng */
        }

        body {
            font-family: 'Nunito', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            margin: 0;
            padding: 40px 20px;
            min-height: 100vh;
        }

        .main-wrapper {
            max-width: 1200px;
            margin: 0 auto;
            background: #ffffff;
            padding: 35px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.02); /* Đổ bóng siêu nhẹ, thanh lịch */
            border: 1px solid #f1f2f6;
        }

        h1 {
            font-family: 'Comfortaa', cursive;
            text-align: center;
            color: var(--primary-purple);
            margin-bottom: 5px;
            font-size: 2.2rem;
            font-weight: 700;
        }

        .subtitle {
            text-align: center;
            color: var(--text-muted);
            font-style: italic;
            margin-bottom: 35px;
            font-size: 0.9rem;
        }

        /* Thanh tìm kiếm tối giản tinh tế */
        .search-container {
            max-width: 400px;
            margin: 0 auto 35px auto;
        }

        .search-input {
            width: 100%;
            padding: 12px 20px;
            font-size: 0.95rem;
            border: 1px solid #dfe4ea;
            border-radius: 6px;
            outline: none;
            background: #ffffff;
            color: var(--text-dark);
            transition: border-color 0.2s ease;
            font-family: 'Nunito', sans-serif;
            box-sizing: border-box;
        }

        .search-input:focus {
            border-color: var(--primary-purple);
        }

        /* Bảng danh sách truyện phẳng phẳng, sạch sẽ */
        .table-container {
            overflow-x: auto;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background-color: #f8f9fa;
            color: var(--text-dark);
            font-family: 'Comfortaa', cursive;
            font-weight: 700;
            padding: 16px 20px;
            font-size: 0.95rem;
            border-bottom: 2px solid var(--border-color);
        }

        td {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.95rem;
            vertical-align: middle;
        }

        /* Hiệu ứng lướt hàng êm dịu, nhẹ máy */
        tr {
            transition: background-color 0.2s ease;
        }

        tr:hover {
            background-color: #fcfcff;
        }

        .story-title {
            font-weight: 700;
            color: #2f3542;
        }

        .author-name {
            color: var(--text-muted);
        }

        /* NÚT THỂ LOẠI KHÔNG CÒN HIỆU ỨNG NẶNG */
        .genre-tag {
            background: #f1f2f6;
            color: #57606f;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: 600;
            display: inline-block;
            margin: 2px;
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
        }

        .genre-tag:hover {
            background: var(--primary-purple);
            color: #ffffff;
        }

        .notes-text {
            color: var(--text-muted);
            font-size: 0.9rem;
            line-height: 1.4;
        }

        /* 2 NÚT RAW VÀ QT TỐI GIẢN CHÂN PHƯƠNG, SIÊU SANG */
        .btn-download {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 58px;
            padding: 7px 0;
            margin: 2px;
            border-radius: 4px;
            color: #ffffff;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.75rem;
            text-transform: uppercase;
            font-family: 'Comfortaa', cursive;
            transition: opacity 0.2s ease;
        }

        .btn-raw { background-color: var(--raw-color); }
        .btn-qt { background-color: var(--qt-color); }

        .btn-download:hover {
            opacity: 0.85; /* Hiệu ứng mờ nhẹ thanh lịch khi hover */
        }

        @media (max-width: 768px) {
            .main-wrapper { padding: 20px; }
            th, td { padding: 12px; }
            h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <h1>✿ Kho Tải Truyện Cao Cấp ✿</h1>
    <div class="subtitle">Nơi cập nhật những bộ truyện sủng công lãng mạn nhất</div>
    
    <div class="search-container">
        <input type="text" id="searchBar" class="search-input" placeholder="Tìm tên truyện, tác giả, thể loại...">
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th style="width: 25%">Tên truyện</th>
                    <th style="width: 15%">Tác giả</th>
                    <th style="width: 23%">Thể loại</th>
                    <th style="width: 22%">Ghi chú</th>
                    <th style="width: 15%; text-align: center;">Tải về</th>
                </tr>
            </thead>
            <tbody id="storyTableBody">
                </tbody>
        </table>
    </div>
</div>

<script>
    const dataStories = [
      {
        "id": 1,
        "ten": "Truyện Ngọt Ngào Nhất Thế Gian",
        "tacGia": "Mèo Của Công Bảo",
        "theLoai": "Đam mỹ, Sủng công, Công khống",
        "ghiChu": "Truyện siêu ngọt, thụ sủng công lên trời, đề cử!",
        "linkRaw": "https://drive.google.com/...",
        "linkQT": "https://mediafire.com/..."
      },
      {
        "id": 2,
        "ten": "Xuyên Thành Vạn Nhân Mê Nhưng Chỉ Sủng Công",
        "tacGia": "Cá Muối Chăm Chỉ",
        "theLoai": "Xuyên nhanh, Hệ thống, Thụ sủng công",
        "ghiChu": "Bản cập nhật mới nhất ngày hôm nay.",
        "linkRaw": "https://drive.google.com/...",
        "linkQT": "https://mediafire.com/..."
      },
      {
        "id": 1781870912608,
        "ten": "Chủ công đơn nguyên văn",
        "tacGia": "Marey",
        "theLoai": "Chủ công, thụ sủng công, hiện đại",
        "ghiChu": "Đơn nguyên văn",
        "linkRaw": "https://drive.google.com/file/d/1XFm9Fm_2VaDXXZQx6vJAAUB_clT6tbe7/view?usp=drive_link",
        "linkQT": "k"
      }
    ];

    let globalStories = [...dataStories];
    globalStories.sort((a, b) => b.id - a.id);

    function displayStories(data) {
        const tableBody = document.getElementById('storyTableBody');
        if (!tableBody) return;
        
        tableBody.innerHTML = '';
        if (data.length === 0) {
            tableBody.innerHTML = `<tr><td colspan="5" style="text-align:center; color:#999; padding: 30px;">Không thấy truyện cần tìm rồi nàng ơi...</td></tr>`;
            return;
        }
        
        data.forEach(story => {
            const genres = story.theLoai ? story.theLoai.split(',').map(g => {
                const genreName = g.trim();
                return `<span class="genre-tag" onclick="filterByGenre('${genreName}')">${genreName}</span>`;
            }).join('') : '-';
            
            const isValidLink = (link) => link && link.trim().toLowerCase().startsWith('http');

            const btnRaw = isValidLink(story.linkRaw) ? `<a href="${story.linkRaw}" target="_blank" class="btn-download btn-raw">Raw</a>` : '';
            const btnQT = isValidLink(story.linkQT) ? `<a href="${story.linkQT}" target="_blank" class="btn-download btn-qt">QT</a>` : '';
            
            const downloadCell = (btnRaw || btnQT) ? `${btnRaw} ${btnQT}` : '<span style="color:#bbb; font-style:italic;">Chưa có</span>';

            const row = `
                <tr>
                    <td class="story-title">${story.ten || '-'}</td>
                    <td class="author-name">${story.tacGia || '-'}</td>
                    <td>${genres}</td>
                    <td class="notes-text">${story.ghiChu || '-'}</td>
                    <td style="text-align: center; white-space: nowrap;">
                        ${downloadCell}
                    </td>
                </tr>
            `;
            tableBody.innerHTML += row;
        });
    }

    function filterByGenre(genreName) {
        const searchBar = document.getElementById('searchBar');
        if (searchBar) {
            searchBar.value = genreName;
            const keyword = genreName.toLowerCase();
            const filtered = globalStories.filter(story => 
                (story.ten && story.ten.toLowerCase().includes(keyword)) || 
                (story.tacGia && story.tacGia.toLowerCase().includes(keyword)) || 
                (story.theLoai && story.theLoai.toLowerCase().includes(keyword))
            );
            displayStories(filtered);
            searchBar.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
    }

    function initStories() {
        displayStories(globalStories);

        const searchBar = document.getElementById('searchBar');
        if (searchBar) {
            searchBar.addEventListener('input', (e) => {
                const keyword = e.target.value.toLowerCase().trim();
                const filtered = globalStories.filter(story => 
                    (story.ten && story.ten.toLowerCase().includes(keyword)) || 
                    (story.tacGia && story.tacGia.toLowerCase().includes(keyword)) || 
                    (story.theLoai && story.theLoai.toLowerCase().includes(keyword))
                );
                displayStories(filtered);
            });
        }
    }

    window.onload = initStories;
</script>
</body>
</html>
