<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kho Tải Truyện Đam Mỹ QT - hỗ sủng thiên công, thụ sủng công, công khống</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@500;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f7f5f0; /* Nền xám sữa kem dịu mắt */
            --primary-earth-green: #556b2f; /* Xanh lá đất (Xanh rêu) làm nút Đọc */
            --earth-orange: #d97443; /* Cam đất làm nút Raw */
            --earth-blue: #4a6b82; /* Xanh đất trầm làm nút QT */
            --text-dark: #2f3542;
            --text-muted: #747d8c;
            --border-color: #a4b0be; /* Màu xám viền */
        }

        body {
            font-family: 'Nunito', sans-serif;
            background-color: #f7f5f0;
            background-image: radial-gradient(#dcd5c7 1px, transparent 1px);
            background-size: 25px 25px;
            color: var(--text-dark);
            margin: 0;
            padding: 40px 20px;
            min-height: 100vh;
        }

        /* KHUNG VIỀN NGOÀI CHẤM BI SANG TRỌNG */
        .main-wrapper {
            max-width: 1250px;
            margin: 0 auto;
            background: #ffffff;
            padding: 35px;
            border-radius: 24px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.01);
            border: 3px dotted var(--border-color); /* Duy nhất viền ngoài này chấm bi */
        }

        h1 {
            font-family: 'Comfortaa', cursive;
            text-align: center;
            color: var(--primary-earth-green);
            margin-bottom: 5px;
            font-size: 2.2rem;
            font-weight: 700;
        }

        .subtitle {
            text-align: center;
            color: var(--text-muted);
            font-style: italic;
            margin-bottom: 35px;
            font-size: 0.9rem;
        }

        /* Thanh tìm kiếm tối giản bo tròn viền liền mảnh */
        .search-container {
            max-width: 400px;
            margin: 0 auto 35px auto;
        }

        .search-input {
            width: 100%;
            padding: 12px 25px;
            font-size: 0.95rem;
            border: 1px solid #dfe4ea; /* Viền liền mảnh sạch sẽ */
            border-radius: 50px; /* Bo tròn tuyệt đối */
            outline: none;
            background: #ffffff;
            color: var(--text-dark);
            transition: all 0.2s ease;
            font-family: 'Nunito', sans-serif;
            box-sizing: border-box;
        }

        .search-input:focus {
            border-color: var(--earth-orange);
        }

        /* Bảng phẳng lì, gọn nhẹ */
        .table-container {
            overflow-x: auto;
            border-radius: 12px;
            border: 1px solid #dfe4ea; /* Viền bảng liền mảnh thanh lịch */
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background-color: #f1f2f6;
            color: var(--text-dark);
            font-family: 'Comfortaa', cursive;
            font-weight: 700;
            padding: 16px 20px;
            font-size: 0.95rem;
            border-bottom: 2px solid #dfe4ea;
        }

        td {
            padding: 16px 20px;
            border-bottom: 1px solid #f1f2f6;
            font-size: 0.95rem;
            vertical-align: middle;
        }

        tr {
            transition: background-color 0.2s ease;
        }

        tr:hover {
            background-color: #f9f8f6;
        }

        .story-title {
            font-weight: 700;
            color: var(--text-dark);
        }

        .author-name {
            color: var(--text-muted);
        }

        /* TAG THỂ LOẠI BO TRÒN */
        .genre-tag {
            background: #f1f2f6;
            color: #57606f;
            padding: 5px 14px;
            border-radius: 50px; /* Bo tròn bong bóng */
            font-size: 0.8rem;
            font-weight: 600;
            display: inline-block;
            margin: 3px 2px;
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
        }

        .genre-tag:hover {
            background: var(--primary-earth-green);
            color: #ffffff;
        }

        .notes-text {
            color: var(--text-muted);
            font-size: 0.9rem;
            line-height: 1.4;
        }

        /* TẤT CẢ CÁC NÚT BẤM ĐỀU BO TRÒN 100% */
        .btn-download {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 62px;
            padding: 8px 0;
            margin: 2px;
            border-radius: 50px; /* Bo góc bong bóng tròn xịn */
            color: #ffffff;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.75rem;
            text-transform: uppercase;
            font-family: 'Comfortaa', cursive;
            transition: opacity 0.2s ease;
        }

        .btn-doc { background-color: var(--primary-earth-green); width: 75px; } /* Nút Đọc online to hơn xíu */
        .btn-raw { background-color: var(--earth-orange); }
        .btn-qt { background-color: var(--earth-blue); }

        .btn-download:hover {
            opacity: 0.85;
        }

        @media (max-width: 768px) {
            .main-wrapper { padding: 20px; }
            th, td { padding: 12px; }
            h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <h1>✿ Kho Tải Truyện Đam Mỹ QT - hỗ sủng thiên công, thụ sủng công, công khống ✿</h1>
    <div class="subtitle">Đang xây dựng...</div>
    
    <div class="search-container">
        <input type="text" id="searchBar" class="search-input" placeholder="Tìm tên truyện, tác giả, thể loại...">
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th style="width: 22%">Tên truyện</th>
                    <th style="width: 14%">Tác giả</th>
                    <th style="width: 20%">Thể loại</th>
                    <th style="width: 18%">Ghi chú</th>
                    <th style="width: 13%; text-align: center;">Đọc Online</th>
                    <th style="width: 13%; text-align: center;">Tải Về</th>
                </tr>
            </thead>
            <tbody id="storyTableBody">
                </tbody>
        </table>
    </div>
</div>

<script>
    // MẢNG DỮ LIỆU GỐC (Bà cập nhật thêm truyện ở đây)
    const dataStories = [
      {
  "id": 1784379108863,
  "ten": "Ảnh đế là người ngoài hành tinh",
  "tacGia": "Lâm Tiểu Dạng",
  "theLoai": "giới giải trí, ngốc manh công, 1v1, chủ công, hiện đại",
  "ghiChu": "Chủ công, ngốc manh ET ảnh đế công",
  "linkDoc": "https://sigende.io.vn/library/4/series/264",
  "linkRaw": "https://arweave.net/raw/EqGywFnZBUjRVoZVRrm019IQLC_mx4joklp5TJ2GNwg?filename=%E5%BD%B1%E5%B8%9D%E6%98%AF%E5%A4%96%E6%98%9F%E4%BA%BA.txt",
  "linkQT": "https://arweave.net/raw/7PCFVFhS-7u2CtaOL8edsN-bE1AEFoTWpgPH1fe5Or0?filename=%E1%BA%A2nh%20%C4%91%E1%BA%BF%20l%C3%A0%20ng%C6%B0%E1%BB%9Di%20ngo%C3%A0i%20h%C3%A0nh%20tinh.epub"
},
      {
  "id": 1784377254606,
  "ten": "Cùng gắt gỏng công chung đụng 99 loại phương pháp",
  "tacGia": "Hắc Sắc Địa Bản",
  "theLoai": "Chủ công, thụ sủng công, hiện đại, nhất công đa thụ, niên thượng, thụ truy công",
  "ghiChu": "1, một công N thụ, vai chính công, gắt gỏng bảo thủ cấm dục vạn nhân mê công. Tổng thể ấm áp không ngược. Đúng, chính là cục bộ tiểu ngược.\n\n \n\n2, có biến thái qua lại. Yêu nhất giam cầm hệ bệnh kiều hệ nhất định phải qua lại a! (Chú: Thụ giam cầm công ta sẽ nói! )\n\n \n\n3, lẽ nào ngươi thật sự cho rằng không tiết tháo tác giả sẽ liệt kê ra 99 loại phương pháp?\n\n \n\n4, coi như người dùng bày ra pháp viết văn án là có thể biết, bài này là cỡ nào nghiêm túc chính kịch a...",
  "linkDoc": "https://sigende.io.vn/library/4/series/263",
  "linkRaw": "https://arweave.net/raw/xdU9VIOZVcjiBLnQcrEWWd83z6BZqqGyq6OOM5yNR1Q?filename=%E3%80%8A%E4%B8%8E%E6%9A%B4%E8%BA%81%E6%94%BB%E7%9B%B8%E5%A4%84%E7%9A%8499%E7%A7%8D%E6%96%B9%E6%B3%95%E3%80%8BBY%E9%BB%91%E8%89%B2%E5%9C%B0%E6%9D%BF%E7%8E%B0%E4%BB%A3_%E4%B8%80%E6%94%BBN%E5%8F%97_%E6%9A%B4%E8%BA%81%E4%BF%9D%E5%AE%88%E7%A6%81%E6%AC%B2%E4%B8%87%E4%BA%BA%E8%BF%B7%E4%B8%BB%E6%94%BB_%E6%9C%89%E5%9B%9A%E7%A6%81%E7%97%85%E5%A8%87_HE.txt",
  "linkQT": "https://arweave.net/raw/vczAQYvAGxGcFb_xEmDhNvlcJsxS2wkHn526mN5NqT8?filename=C%C3%B9ng%20g%E1%BA%AFt%20g%E1%BB%8Fng%20c%C3%B4ng%20chung%20%C4%91%E1%BB%A5ng%2099%20lo%E1%BA%A1i%20ph%C6%B0%C6%A1ng%20ph%C3%A1p.epub"
},
      {
  "id": 1781881055944,
  "ten": "Nhìn rõ ràng tình thế thật sao",
  "tacGia": "Tình Phong Bút Hạc",
  "theLoai": "ngôi thứ nhất, chủ công, nhược cường, thụ sủng công",
  "ghiChu": "Là có hải vương thuộc tính cơ bụng tám múi 1 mét bảy tám tuấn tú công",
  "linkDoc": "e",
  "linkRaw": "https://drive.google.com/drive/u/1/folders/1W1AYyJNkgY7PgjFHkn2KXMAGz5t6sron",
  "linkQT": "g"
},
{
  "id": 1781876302012,
  "ten": "Quá thông minh",
  "tacGia": "A Chinh Cửu Y",
  "theLoai": "chủ công, thầm mến, thụ sủng công",
  "ghiChu": "Ái tình hướng về đơn mũi tên (thụ → công) (thụ mũi tên lớn hơn công), thụ thầm mến công, truy công",
  "linkDoc": "https://chucongconvert.vercel.app/taitruyen",
  "linkRaw": "https://drive.google.com/drive/u/1/folders/151oRMdJbnnIN-8q6snAqHqR1Oo7tJ-lq",
  "linkQT": "https://chucongconvert.vercel.app/taitruyen"
}
    ];

    let globalStories = [...dataStories];
    globalStories.sort((a, b) => b.id - a.id);

    function displayStories(data) {
        const tableBody = document.getElementById('storyTableBody');
        if (!tableBody) return;
        
        tableBody.innerHTML = '';
        if (data.length === 0) {
            tableBody.innerHTML = `<tr><td colspan="6" style="text-align:center; color:#999; padding: 30px;">Không thấy truyện cần tìm rồi nàng ơi...</td></tr>`;
            return;
        }
        
        data.forEach(story => {
            const genres = story.theLoai ? story.theLoai.split(',').map(g => {
                const genreName = g.trim();
                return `<span class="genre-tag" onclick="filterByGenre('${genreName}')">${genreName}</span>`;
            }).join('') : '-';
            
            const isValidLink = (link) => link && link.trim().toLowerCase().startsWith('http');

            // Xử lý nút Đọc online
            const btnDoc = isValidLink(story.linkDoc) ? `<a href="${story.linkDoc}" target="_blank" class="btn-download btn-doc">Đọc</a>` : '<span style="color:#bbb; font-style:italic;">Chưa có</span>';

            // Xử lý nút Tải về (Raw, QT)
            const btnRaw = isValidLink(story.linkRaw) ? `<a href="${story.linkRaw}" target="_blank" class="btn-download btn-raw">Raw</a>` : '';
            const btnQT = isValidLink(story.linkQT) ? `<a href="${story.linkQT}" target="_blank" class="btn-download btn-qt">QT</a>` : '';
            const downloadCell = (btnRaw || btnQT) ? `${btnRaw} ${btnQT}` : '<span style="color:#bbb; font-style:italic;">Chưa có</span>';

            const row = `
                <tr>
                    <td class="story-title">${story.ten || '-'}</td>
                    <td class="author-name">${story.tacGia || '-'}</td>
                    <td>${genres}</td>
                    <td class="notes-text">${story.ghiChu || '-'}</td>
                    <td style="text-align: center; white-space: nowrap;">${btnDoc}</td>
                    <td style="text-align: center; white-space: nowrap;">${downloadCell}</td>
                </tr>
            `;
            tableBody.innerHTML += row;
        });
    }

    function filterByGenre(genreName) {
        const searchBar = document.getElementById('searchBar');
        if (searchBar) {
            searchBar.value = genreName;
            const keyword = genreName.toLowerCase();
            const filtered = globalStories.filter(story => 
                (story.ten && story.ten.toLowerCase().includes(keyword)) || 
                (story.tacGia && story.tacGia.toLowerCase().includes(keyword)) || 
                (story.theLoai && story.theLoai.toLowerCase().includes(keyword))
            );
            displayStories(filtered);
            searchBar.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
    }

    function initStories() {
        displayStories(globalStories);

        const searchBar = document.getElementById('searchBar');
        if (searchBar) {
            searchBar.addEventListener('input', (e) => {
                const keyword = e.target.value.toLowerCase().trim();
                const filtered = globalStories.filter(story => 
                    (story.ten && story.ten.toLowerCase().includes(keyword)) || 
                    (story.tacGia && story.tacGia.toLowerCase().includes(keyword)) || 
                    (story.theLoai && story.theLoai.toLowerCase().includes(keyword))
                );
                displayStories(filtered);
            });
        }
    }

    window.onload = initStories;
</script>
</body>
</html>
