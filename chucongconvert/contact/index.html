<body>

<!-- HEADER -->
<header class="site-header">
  <div class="logo-badge">CHUCONG<br>CONVERT</div>

  <p class="site-tagline">hỗ sủng thiên công &bull; sủng công &bull; công khống</p>
  <nav class="nav-strip">
    <a href="https://wattpad.com/dammysungcong">Wattpad</a>
    <a href="https://www.facebook.com/congbaoqt">FB Page</a>
    <a href="https://t.me/congkhongsungcong">Tele Channel</a>
    <a href="https://t.me/+C74BtIy_Z79iMjA1">Tele Chat</a>
    <a href="https://t.me/ckschstc_bot">Tele Bot</a>
    <a href="https://drive.google.com/drive/u/1/folders/1bic3XdphiXtiqc_PI43XFdmRmRdrxGUe">Drive</a>
  </nav>
</header>

<!-- BOARD -->
<section class="board" id="work">
  <span class="doodle doodle--1">✿</span>
  <span class="doodle doodle--2">☁</span>
  <span class="doodle doodle--3">♡</span>
  <span class="doodle doodle--4">✦</span>
  <span class="doodle doodle--5">⌇</span>

  <span class="doodle doodle--6">✿</span>


<div class="contact-card">
    <div class="contact-header">
        <h2>Gửi Góp Ý</h2>
        <p>Ý kiến của bạn sẽ giúp CHUCONGCONVERT hoàn thiện hơn!</p>
    </div>
    
    <form action="https://formspree.io/f/mqeovqlk" method="POST">
        <div class="input-group">
            <input type="text" name="name" required placeholder="Tên của bạn">
        </div>
        
        <div class="input-group">
            <input type="email" name="_replyto" required placeholder="Email của bạn">
        </div>
        
        <div class="input-group">
            <textarea name="message" rows="4" required placeholder="Lời nhắn..."></textarea>
        </div>
        
        <button type="submit" class="submit-btn">
            <span>Gửi Tin Nhắn</span>
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                <path d="M15.854.146a.5.5 0 0 1 .11.54l-5.819 14.547a.75.75 0 0 1-1.329.124l-3.178-4.995L.643 7.184a.75.75 0 0 1 .124-1.33L15.314.037a.5.5 0 0 1 .54.11ZM6.636 10.07l2.761 4.338L14.13 2.576zm6.787-8.201L1.591 6.602l4.339 2.76z"/>
            </svg>
        </button>
    </form>
</div>
</div>
