<body>

<!-- HEADER -->
<header class="site-header">
  <div class="logo-badge">CHUCONG<br>CONVERT</div>
  <h1 class="site-title">CHUCONG<span>_</span>CONVERT</h1>
  <p class="site-tagline">hỗ sủng thiên công &bull; sủng công &bull; công khống</p>
  <nav class="nav-strip">
    <a href="https://wattpad.com/dammysungcong">Wattpad</a>
    <a href="https://www.facebook.com/congbaoqt">FB Page</a>
    <a href="https://t.me/congkhongsungcong">Tele Channel</a>
    <a href="https://t.me/+C74BtIy_Z79iMjA1">Tele Chat</a>

  </nav>
</header>

<!-- BOARD -->
<section class="board" id="work">
  <span class="doodle doodle--1">✿</span>
  <span class="doodle doodle--2">☁</span>
  <span class="doodle doodle--3">♡</span>
  <span class="doodle doodle--4">✦</span>
  <span class="doodle doodle--5">⌇</span>

  <span class="doodle doodle--6">✿</span>

 <div class="contact-container">
    <h2>Liên Hệ Với Tôi</h2>
    <p>Gửi góp ý hoặc ý tưởng của bạn về trang CHUCONGCONVERT nhé!</p>
    
    <form action="https://formspree.io/f/mqeovqlk" method="POST" class="contact-form">
        
        <div class="form-group">
            <label for="name">Tên của bạn:</label>
            <input type="text" id="name" name="name" placeholder="Nhập tên..." required>
        </div>
        
        <div class="form-group">
            <label for="email">Email liên hệ:</label>
            <input type="email" id="email" name="_replyto" placeholder="Nhập email của bạn..." required>
        </div>
        
        <div class="form-group">
            <label for="message">Lời nhắn / Góp ý:</label>
            <textarea id="message" name="message" rows="5" placeholder="Viết gì đó cho tôi..." required></textarea>
        </div>
        
        <input type="hidden" name="_subject" value="Góp ý mới từ CHUCONGCONVERT!">
        
        <button type="submit" class="btn-submit">Gửi Tin Nhắn</button>
    </form>
</div>

<!-- FOOTER -->
<footer class="site-footer">
  <hr class="footer-line">
  <p>&copy; 2026 CHUCONGCONVERT &nbsp;<span class="footer-heart">♡</span>&nbsp; Made with markers &amp; magic</p>
