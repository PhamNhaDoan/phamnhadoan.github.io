<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Góc Admin Ghi Chú 🛠️</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #fdfaf6;
            background-image: radial-gradient(#e5d1be 1.5px, transparent 1.5px);
            background-size: 24px 24px;
            color: #5c4a3c;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }
        .admin-box {
            width: 100%;
            max-width: 550px;
            background-color: rgba(255, 253, 249, 0.98);
            border: 2px dashed #dda15e;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        h2 {
            text-align: center;
            color: #bc6c25;
            margin-bottom: 25px;
            font-size: 24px;
        }
        .form-group {
            margin-bottom: 18px;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            font-size: 14px;
            color: #7f5539;
        }
        input[type="text"], input[type="date"], textarea {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #e6ccb2;
            border-radius: 10px;
            font-family: 'Quicksand', sans-serif;
            font-size: 15px;
            background-color: #fff;
            color: #4a3b2c;
            outline: none;
            transition: all 0.3s;
        }
        input:focus, textarea:focus {
            border-color: #b79477;
            box-shadow: 0 0 8px rgba(221, 161, 94, 0.2);
        }
        textarea {
            resize: vertical;
            min-height: 120px;
        }
        .btn-submit {
            width: 100%;
            padding: 14px;
            background-color: #dda15e;
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }
        .btn-submit:hover {
            background-color: #bc6c25;
        }
        .status-msg {
            margin-top: 15px;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-size: 14px;
            display: none;
        }
        .status-success { display: block; background-color: #e8f5e9; color: #2e7d32; border: 1px solid #c8e6c9; }
        .status-error { display: block; background-color: #ffebee; color: #c62828; border: 1px solid #ffcdd2; }
    </style>
</head>
<body>

    <div class="admin-box">
        <h2>Thêm Ghi Chú Mới ✏️</h2>
        <form id="noteForm">
            <div class="form-group">
                <label>Tài khoản GitHub</label>
                <input type="text" id="githubUser" value="PhamNhaDoan" readonly style="background-color: #f1ebd9; color: #7f5539;">
            </div>
            <div class="form-group">
                <label>Repository</label>
                <input type="text" id="githubRepo" value="phamnhadoan.github.io" readonly style="background-color: #f1ebd9; color: #7f5539;">
            </div>
            <div class="form-group">
                <label>GitHub Token (Sẽ tự động lưu lại ở máy bà)</label>
                <input type="text" id="githubToken" placeholder="ghp_..." required>
            </div>
            <div class="form-group">
                <label>Ngày ghi chú</label>
                <input type="date" id="noteDate" required>
            </div>
            <div class="form-group">
                <label>Nội dung ghi chú</label>
                <textarea id="noteContent" placeholder="Hôm nay bà muốn lưu lại điều gì nè..." required></textarea>
            </div>
            <button type="submit" class="btn-submit" id="submitBtn">Đẩy Lên Sổ Tay Ngay 🚀</button>
        </form>

        <div id="statusBox" class="status-msg"></div>
    </div>

    <script>
        // Tự động điền ngày hôm nay vào ô Date khi vừa load trang
        document.getElementById('noteDate').value = new Date().toISOString().split('T')[0];

        // Lấy lại token cũ đã lưu trong máy nếu có
        if (localStorage.getItem('note_github_token')) {
            document.getElementById('githubToken').value = localStorage.getItem('note_github_token');
        }

        document.getElementById('noteForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const btn = document.getElementById('submitBtn');
            const statusBox = document.getElementById('statusBox');
            
            const user = document.getElementById('githubUser').value.trim();
            const repo = document.getElementById('githubRepo').value.trim();
            const token = document.getElementById('githubToken').value.trim();
            const date = document.getElementById('noteDate').value;
            const content = document.getElementById('noteContent').value;

            // Lưu token lại để lần sau đỡ gõ lại nha bấy bê
            localStorage.setItem('note_github_token', token);

            btn.disabled = true;
            btn.innerText = 'Đang lưu lên hệ thống GitHub... ⏳';
            statusBox.className = 'status-msg';
            statusBox.style.display = 'none';

            // Đường dẫn đến file notes.json trong thư mục note/
            const filePath = 'note/notes.json';
            const apiUrl = `https://api.github.com/repos/${user}/${repo}/contents/${filePath}`;

            let currentSha = null;
            let currentNotes = [];

            // Bước 1: Gọi API kiểm tra xem file notes.json đã tồn tại trên GitHub chưa
            try {
                const res = await fetch(apiUrl, {
                    headers: { 'Authorization': `token ${token}` }
                });
                
                if (res.ok) {
                    const fileData = await res.json();
                    currentSha = fileData.sha;
                    // Giải mã base64 từ GitHub về chuỗi text UTF-8
                    const decodeContent = decodeURIComponent(atob(fileData.content).split('').map(function(c) {
                        return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                    }).join(''));
                    currentNotes = JSON.parse(decodeContent);
                }
            } catch (error) {
                console.log("File chưa tồn tại, hệ thống sẽ tự tạo mới tinh!");
            }

            // Bước 2: Thêm dòng ghi chú mới vào mảng dữ liệu
            const newNote = {
                id: 'note_' + new Date().getTime(),
                date: date,
                content: content
            };
            currentNotes.push(newNote);

            // Bước 3: Mã hóa lại chuỗi JSON sang base64 đúng chuẩn UTF-8 để đẩy lên GitHub
            const jsonString = JSON.stringify(currentNotes, null, 2);
            const base64Content = btoa(encodeURIComponent(jsonString).replace(/%([0-9A-F]{2})/g, function(match, p1) {
                return String.fromCharCode('0x' + p1);
            }));

            // Bước 4: Đẩy dữ liệu (Push/Commit) lên lại GitHub
            try {
                const payload = {
                    message: `Thêm ghi chú ngày ${date} từ trang Admin`,
                    content: base64Content
                };
                if (currentSha) {
                    payload.sha = currentSha; // Nếu sửa file cũ thì bắt buộc phải kèm mã SHA này
                }

                const putRes = await fetch(apiUrl, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                if (putRes.ok) {
                    statusBox.innerText = 'Đã đẩy ghi chú lên cuốn sổ tay thành công rồi nha bà ơi! 🥰✨';
                    statusBox.className = 'status-msg status-success';
                    document.getElementById('noteContent').value = ''; // Xóa sạch ô nhập văn bản cũ
                } else {
                    const errData = await putRes.json();
                    statusBox.innerText = `Lỗi hệ thống: ${errData.message || 'Token sai hoặc không có quyền ghi'}`;
                    statusBox.className = 'status-msg status-error';
                }
            } catch (err) {
                statusBox.innerText = 'Có lỗi mạng xảy ra khi kết nối tới GitHub rồi bà ơi!';
                statusBox.className = 'status-msg status-error';
            } finally {
                btn.disabled = false;
                btn.innerText = 'Đẩy Lên Sổ Tay Ngay 🚀';
            }
        });
    </script>
</body>
</html>
