<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tải Truyện Wattpad - Auto Download</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 700px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            color: #ff6600;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            font-size: 14px;
            line-height: 1.6;
        }

        .input-section {
            margin-bottom: 25px;
        }

        label {
            display: block;
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            flex: 1;
            padding: 14px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #ff6600;
            box-shadow: 0 0 0 3px rgba(255, 102, 0, 0.1);
        }

        input[type="text"]::placeholder {
            color: #999;
        }

        .btn-paste {
            padding: 14px 20px;
            background-color: #f0f0f0;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            color: #333;
            transition: 0.3s;
            font-size: 14px;
        }

        .btn-paste:hover {
            background-color: #e8e8e8;
            border-color: #ff6600;
        }

        .btn-action {
            width: 100%;
            padding: 16px;
            background-color: #ff6600;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 15px;
        }

        .btn-action:hover {
            background-color: #e65c00;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 102, 0, 0.3);
        }

        .btn-action:active {
            transform: translateY(0);
        }

        .btn-action.loading {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid #ffffff;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .message {
            margin-top: 15px;
            padding: 14px;
            border-radius: 8px;
            font-size: 14px;
            display: none;
        }

        .message.error {
            background-color: #fee;
            color: #c33;
            border-left: 4px solid #c33;
            display: block;
        }

        .message.success {
            background-color: #efe;
            color: #3c3;
            border-left: 4px solid #3c3;
            display: block;
        }

        .message.info {
            background-color: #e7f3ff;
            color: #004085;
            border-left: 4px solid #004085;
            display: block;
        }

        .message.warning {
            background-color: #fff3cd;
            color: #856404;
            border-left: 4px solid #ffc107;
            display: block;
        }

        .result-section {
            margin-top: 30px;
            padding-top: 25px;
            border-top: 2px solid #f0f0f0;
            display: none;
        }

        .result-title {
            font-weight: 700;
            color: #333;
            margin-bottom: 20px;
            font-size: 16px;
        }

        .story-info {
            background-color: #f9f9f9;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 13px;
        }

        .story-info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            color: #555;
        }

        .story-info-row:last-child {
            margin-bottom: 0;
        }

        .story-info-row strong {
            color: #333;
            word-break: break-all;
        }

        .download-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            margin-bottom: 15px;
        }

        .download-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 14px;
            text-align: center;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 700;
            color: white;
            transition: 0.3s;
            border: none;
            cursor: pointer;
            font-size: 14px;
            flex-direction: column;
            gap: 5px;
        }

        .btn-epub {
            background-color: #007bff;
        }

        .btn-epub:hover {
            background-color: #0056b3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 123, 255, 0.3);
        }

        .btn-docx {
            background-color: #28a745;
        }

        .btn-docx:hover {
            background-color: #218838;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(40, 167, 69, 0.3);
        }

        .btn-auto {
            background-color: #17a2b8;
        }

        .btn-auto:hover {
            background-color: #138496;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(23, 162, 184, 0.3);
        }

        .tools-status {
            background-color: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 13px;
        }

        .tool-status-item {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
            padding: 8px;
            border-radius: 4px;
            background-color: #fff;
        }

        .tool-status-item:last-child {
            margin-bottom: 0;
        }

        .status-icon {
            font-size: 16px;
            min-width: 20px;
        }

        .status-icon.checking {
            animation: spin 0.6s linear infinite;
        }

        .tool-name {
            font-weight: 600;
            color: #333;
            min-width: 80px;
        }

        .tool-message {
            color: #666;
            flex: 1;
        }

        @media (max-width: 600px) {
            .container {
                padding: 25px;
            }

            h1 {
                font-size: 24px;
            }

            .input-wrapper {
                flex-direction: column;
            }

            .btn-paste {
                width: 100%;
            }

            .download-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>📚 Tải Truyện Wattpad</h1>
        <p class="subtitle">Tự động tìm công cụ hoạt động và tải xuống</p>
    </div>

    <div class="input-section">
        <label for="wattpadUrl">Đường dẫn Wattpad:</label>
        <div class="input-wrapper">
            <input 
                type="text" 
                id="wattpadUrl" 
                placeholder="Ví dụ: https://www.wattpad.com/story/123456789-ten-truyen"
                aria-label="Nhập hoặc dán link Wattpad"
            >
            <button class="btn-paste" onclick="pasteFromClipboard()" title="Dán từ clipboard">
                📋 Dán
            </button>
        </div>
    </div>

    <button class="btn-action" id="submitBtn" onclick="analyzeWattpadUrl()">
        ✨ Tải Xuống (Auto Find)
    </button>

    <div id="message" class="message"></div>

    <div id="resultSection" class="result-section">
        <div class="result-title">✅ Đang tìm công cụ hoạt động...</div>
        
        <div class="story-info">
            <div class="story-info-row">
                <span>Story ID:</span>
                <strong id="storyId">-</strong>
            </div>
        </div>

        <div class="download-grid">
            <button class="download-btn btn-auto" onclick="autoDownload('epub')">
                <span>🤖 Auto EPUB</span>
                <span style="font-size: 12px; font-weight: normal;">(Tự động)</span>
            </button>
            
            <button class="download-btn btn-auto" onclick="autoDownload('docx')">
                <span>🤖 Auto DOCX</span>
                <span style="font-size: 12px; font-weight: normal;">(Tự động)</span>
            </button>
        </div>

        <div id="toolsStatus" class="tools-status">
            <div style="margin-bottom: 10px; font-weight: 600; color: #333;">🔍 Trạng thái công cụ:</div>
            <div id="toolsList"></div>
        </div>
    </div>
</div>

<script>
    const urlInput = document.getElementById('wattpadUrl');
    const submitBtn = document.getElementById('submitBtn');
    const messageDiv = document.getElementById('message');
    const resultSection = document.getElementById('resultSection');
    const storyIdDisplay = document.getElementById('storyId');
    const toolsStatusDiv = document.getElementById('toolsList');

    // Danh sách công cụ download
    const TOOLS = [
        {
            name: 'Stary',
            url: 'https://stary.live/',
            formats: ['epub', 'docx'],
            buildUrl: (storyId) => `https://stary.live/?story=${storyId}`,
            testUrl: 'https://stary.live/api/health' // Endpoint test
        },
        {
            name: 'Watt2Read',
            url: 'https://watt2read.com/',
            formats: ['all'],
            buildUrl: (storyId) => `https://watt2read.com/?story=${storyId}`,
            testUrl: 'https://watt2read.com/api/check'
        },
        {
            name: 'Wattpad2Pdf',
            url: 'https://wattpad2pdf.com/',
            formats: ['pdf', 'epub'],
            buildUrl: (storyId) => `https://wattpad2pdf.com/?id=${storyId}`,
            testUrl: 'https://wattpad2pdf.com/api/status'
        }
    ];

    // Cho phép gửi form bằng phím Enter
    urlInput.addEventListener('keypress', function(event) {
        if (event.key === 'Enter') {
            analyzeWattpadUrl();
        }
    });

    function showMessage(text, type = 'error') {
        messageDiv.textContent = text;
        messageDiv.className = `message ${type}`;
    }

    function validateWattpadUrl(url) {
        try {
            const urlObj = new URL(url);
            
            if (!urlObj.hostname.includes('wattpad.com')) {
                return {
                    valid: false,
                    error: '❌ Vui lòng nhập link từ wattpad.com'
                };
            }

            const regex = /\/story\/(\d+)/;
            const match = urlObj.pathname.match(regex);

            if (!match || !match[1]) {
                return {
                    valid: false,
                    error: '❌ Không tìm thấy Story ID. Vui lòng kiểm tra lại link'
                };
            }

            return {
                valid: true,
                storyId: match[1]
            };
        } catch (error) {
            return {
                valid: false,
                error: '❌ Link không hợp lệ. Vui lòng nhập đường dẫn đầy đủ'
            };
        }
    }

    function analyzeWattpadUrl() {
        const url = document.getElementById('wattpadUrl').value.trim();

        if (!url) {
            showMessage('❌ Vui lòng nhập link Wattpad', 'error');
            return;
        }

        const validation = validateWattpadUrl(url);

        if (!validation.valid) {
            showMessage(validation.error, 'error');
            resultSection.style.display = 'none';
            return;
        }

        const storyId = validation.storyId;
        storyIdDisplay.textContent = storyId;
        
        submitBtn.classList.add('loading');
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<span class="spinner"></span>Đang kiểm tra công cụ...';

        // Hiển thị result section
        resultSection.style.display = 'block';
        document.querySelector('.result-title').textContent = '🔍 Đang tìm công cụ hoạt động...';
        
        // Kiểm tra tất cả công cụ
        checkAllTools();

        setTimeout(() => {
            submitBtn.classList.remove('loading');
            submitBtn.disabled = false;
            submitBtn.innerHTML = '✨ Tải Xuống (Auto Find)';
        }, 2000);
    }

    async function checkAllTools() {
        const results = [];
        
        for (const tool of TOOLS) {
            addToolStatus(tool.name, 'checking', '⏳ Kiểm tra...');
            
            try {
                // Thử fetch với timeout 5 giây
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 5000);
                
                const response = await fetch(tool.url, {
                    method: 'HEAD',
                    signal: controller.signal,
                    mode: 'no-cors'
                });
                
                clearTimeout(timeoutId);
                
                results.push({
                    ...tool,
                    status: 'working',
                    statusText: '✅ Hoạt động'
                });
                
                addToolStatus(tool.name, 'working', '✅ Hoạt động');
            } catch (error) {
                results.push({
                    ...tool,
                    status: 'failed',
                    statusText: '❌ Lỗi'
                });
                
                addToolStatus(tool.name, 'failed', '❌ Lỗi');
            }
        }

        // Lưu kết quả kiểm tra
        window.toolResults = results;
        
        if (results.some(t => t.status === 'working')) {
            document.querySelector('.result-title').textContent = '✅ Tìm thấy công cụ hoạt động!';
            showMessage('✅ Tìm thấy công cụ! Nhấn "Auto EPUB/DOCX" để tải', 'success');
        } else {
            document.querySelector('.result-title').textContent = '⚠️ Không có công cụ nào hoạt động';
            showMessage('⚠️ Tất cả công cụ đều lỗi. Vui lòng thử lại sau', 'warning');
        }
    }

    function addToolStatus(toolName, status, message) {
        let statusIcon = '';
        if (status === 'checking') {
            statusIcon = '⏳';
        } else if (status === 'working') {
            statusIcon = '✅';
        } else {
            statusIcon = '❌';
        }

        const existingItem = document.querySelector(`[data-tool="${toolName}"]`);
        if (existingItem) {
            existingItem.innerHTML = `
                <span class="status-icon">${statusIcon}</span>
                <span class="tool-name">${toolName}</span>
                <span class="tool-message">${message}</span>
            `;
        } else {
            const item = document.createElement('div');
            item.className = 'tool-status-item';
            item.setAttribute('data-tool', toolName);
            item.innerHTML = `
                <span class="status-icon">${statusIcon}</span>
                <span class="tool-name">${toolName}</span>
                <span class="tool-message">${message}</span>
            `;
            toolsStatusDiv.appendChild(item);
        }
    }

    async function autoDownload(format) {
        const storyId = document.getElementById('storyId').textContent;
        
        if (!storyId || storyId === '-') {
            showMessage('❌ Vui lòng nhập link Wattpad trước', 'error');
            return;
        }

        const results = window.toolResults || [];
        const workingTools = results.filter(t => t.status === 'working');

        if (workingTools.length === 0) {
            showMessage('❌ Không có công cụ nào hoạt động. Vui lòng thử lại', 'error');
            return;
        }

        // Lọc công cụ hỗ trợ format
        const suitableTools = workingTools.filter(tool => 
            tool.formats.includes('all') || tool.formats.includes(format)
        );

        if (suitableTools.length === 0) {
            showMessage(`❌ Không có công cụ hỗ trợ ${format.toUpperCase()}`, 'error');
            return;
        }

        // Sử dụng công cụ đầu tiên hoạt động
        const selectedTool = suitableTools[0];
        const downloadUrl = selectedTool.buildUrl(storyId);

        showMessage(`⏳ Đang mở ${selectedTool.name}...`, 'info');
        
        // Mở link trong tab mới
        window.open(downloadUrl, '_blank');
        
        setTimeout(() => {
            showMessage(`✅ Đã mở ${selectedTool.name} để tải ${format.toUpperCase()}`, 'success');
        }, 1000);
    }

    async function pasteFromClipboard() {
        try {
            const text = await navigator.clipboard.readText();
            urlInput.value = text;
            urlInput.focus();
            showMessage('✅ Dán link thành công!', 'success');
        } catch (error) {
            showMessage('❌ Không thể dán từ clipboard. Vui lòng nhập thủ công', 'error');
        }
    }
</script>

</body>
</html>
