<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arweave Direct Download Generator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #f4f4f4;
        }
        .container {
            max-width: 600px;
            background: #fff;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input[type="text"] {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            padding: 10px 15px;
            background-color: #007bff;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
        }
        button:hover {
            background-color: #0056b3;
        }
        .result {
            margin-top: 20px;
            padding: 10px;
            background: #e9ecef;
            border-radius: 4px;
            display: none;
            word-break: break-all;
        }
        a {
            color: #28a745;
            font-weight: bold;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="form-group">
        <label for="txId">Mã Data TX ID:</label>
        <input type="text" id="txId" placeholder="Dán mã TX ID của file vào đây">
    </div>
    
    <button onclick="generateDownloadLink()">Generate Link</button>
    
    <div id="resultBox" class="result">
        <p>Link tải trực tiếp (Bấm là hiện khung download):</p>
        <a id="downloadLink" href="#"></a>
    </div>
</div>

<script>
function generateDownloadLink() {
    var txId = document.getElementById('txId').value.trim();
    var resultBox = document.getElementById('resultBox');
    var downloadLink = document.getElementById('downloadLink');
    
    if (txId === "") {
        alert("Vui lòng nhập mã TX ID.");
        return;
    }
    
    // Sử dụng endpoint /download/ của Arweave để ép trình duyệt mở khung download và tự lấy tên file gốc
    var finalUrl = "https://arweave.net/download/" + txId;
    
    downloadLink.href = finalUrl;
    downloadLink.innerText = finalUrl;
    resultBox.style.display = "block";
}
</script>

</body>
</html>
