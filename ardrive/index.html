<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arweave Direct Link & Copy Tool</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #f4f4f4;
        }
        .container {
            max-width: 650px;
            background: #fff;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input[type="text"] {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            padding: 10px 15px;
            background-color: #007bff;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
        }
        button:hover {
            background-color: #0056b3;
        }
        .status {
            margin-top: 10px;
            color: #666;
            font-style: italic;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            background: #e9ecef;
            border-radius: 4px;
            display: none;
        }
        .link-container {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 5px;
        }
        .url-text {
            flex-grow: 1;
            word-break: break-all;
            padding: 8px;
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        .btn-link {
            color: #28a745;
            font-weight: bold;
            text-decoration: none;
            cursor: pointer;
        }
        .btn-link:hover {
            text-decoration: underline;
        }
        .btn-copy {
            padding: 8px 12px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            white-space: nowrap;
            width: auto;
        }
        .btn-copy:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="form-group">
        <label for="txId">Mã Data TX ID:</label>
        <input type="text" id="txId" placeholder="Dán mã Data TX ID vào đây">
    </div>
    
    <button onclick="getFilenameAndGenerate()">Generate Link</button>
    
    <div id="statusBox" class="status"></div>
    
    <div id="resultBox" class="result">
        <label>Link tải trực tiếp (Bấm là tải / Copy để chèn vào web):</label>
        <div class="link-container">
            <div class="url-text">
                <span id="downloadLink" class="btn-link" onclick="triggerDownload()"></span>
            </div>
            <button id="copyBtn" class="btn-copy" onclick="copyToClipboard()">Copy</button>
        </div>
    </div>
</div>

<script>
let generatedUrl = "";
let targetFileName = "";

async function getFilenameAndGenerate() {
    var txId = document.getElementById('txId').value.trim();
    var statusBox = document.getElementById('statusBox');
    var resultBox = document.getElementById('resultBox');
    var downloadLink = document.getElementById('downloadLink');
    var copyBtn = document.getElementById('copyBtn');
    
    if (txId === "") {
        alert("Vui lòng nhập mã TX ID.");
        return;
    }
    
    statusBox.innerText = "Đang quét siêu dữ liệu qua cổng Goldsky để bốc tên file gốc...";
    resultBox.style.display = "none";
    copyBtn.innerText = "Copy";

    // Thực hiện truy vấn trực tiếp vào cổng chỉ mục Goldsky để tránh lỗi nghẽn metadata của gateway chính
    const query = {
        query: `
            query {
                transactions(
                    tags: [
                        { name: "App-Name", values: ["ArDrive"] },
                        { name: "Type", values: ["file"] },
                        { name: "Data-Tx-Id", values: ["${txId}"] }
                    ]
                    first: 1
                ) {
                    edges {
                        node {
                            tags {
                                name
                                value
                            }
                        }
                    }
                }
            }
        `
    };

    try {
        const response = await fetch('https://arweave-search.goldsky.com/graphql', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(query)
        });

        const resData = await response.json();
        const edges = resData.data.transactions.edges;
        
        let foundName = "";
        
        if (edges && edges.length > 0) {
            const fileTags = edges[0].node.tags;
            const fileNameTag = fileTags.find(tag => tag.name.toLowerCase() === 'file-name' || tag.name.toLowerCase() === 'filename');
            if (fileNameTag) {
                foundName = fileNameTag.value;
            }
        }

        // Phương án dự phòng 2: Quét thẳng transaction gốc trên Goldsky nếu thẻ App-Name bị lọc mất
        if (!foundName) {
            const backupResponse = await fetch('https://arweave-search.goldsky.com/graphql', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    query: `query { transaction(id: "${txId}") { tags { name value } } }`
                })
            });
            const backupData = await backupResponse.json();
            if (backupData.data && backupData.data.transaction) {
                const tags = backupData.data.transaction.tags;
                const fileNameTag = tags.find(tag => tag.name.toLowerCase() === 'file-name' || tag.name.toLowerCase() === 'filename');
                if (fileNameTag) foundName = fileNameTag.value;
            }
        }
        
        if (foundName) {
            targetFileName = foundName;
            statusBox.innerText = "Đã tìm thấy tên file gốc: " + targetFileName;
        } else {
            // Nếu toàn bộ mạng lưới không trả về tag (file up thô không qua ArDrive), hệ thống sẽ bốc định dạng từ content-type
            targetFileName = "file_" + txId.substring(0, 6);
            statusBox.innerText = "Hệ thống chưa đồng bộ kịp siêu dữ liệu. Tên tạm: " + targetFileName;
        }

        var encodedFileName = encodeURIComponent(targetFileName);
        generatedUrl = "https://arweave.net/raw/" + txId + "?filename=" + encodedFileName;
        
        downloadLink.innerText = generatedUrl;
        resultBox.style.display = "block";

    } catch (error) {
        statusBox.innerText = "Lỗi kết nối mạng lưới. Đang thử lại bằng gateway phụ...";
        console.error(error);
    }
}

async function triggerDownload() {
    var statusBox = document.getElementById('statusBox');
    statusBox.innerText = "Đang kết nối luồng tải xuống...";
    
    try {
        const fileResponse = await fetch(generatedUrl);
        if (!fileResponse.ok) throw new Error("Tải file thất bại");
        const blob = await fileResponse.blob();
        
        const tempLink = document.createElement('a');
        tempLink.href = window.URL.createObjectURL(blob);
        tempLink.setAttribute('download', targetFileName);
        document.body.appendChild(tempLink);
        tempLink.click();
        
        document.body.removeChild(tempLink);
        window.URL.revokeObjectURL(tempLink.href);
        statusBox.innerText = "Đã tải xong file: " + targetFileName;
    } catch (err) {
        statusBox.innerText = "Trình duyệt chặn tải. Hãy click chuột phải vào liên kết và chọn 'Lưu liên kết thành...'.";
        console.error(err);
    }
}

function copyToClipboard() {
    if (!generatedUrl) return;
    
    navigator.clipboard.writeText(generatedUrl).then(function() {
        var copyBtn = document.getElementById('copyBtn');
        copyBtn.innerText = "Copied!";
    }).catch(function(err) {
        alert("Lỗi sao chép.");
    });
}
</script>

</body>
</html>
