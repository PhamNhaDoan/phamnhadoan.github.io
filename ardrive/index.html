<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arweave Direct Link & Copy Tool</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #f4f4f4;
        }
        .container {
            max-width: 650px;
            background: #fff;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input[type="text"] {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            padding: 10px 15px;
            background-color: #007bff;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
        }
        button:hover {
            background-color: #0056b3;
        }
        .status {
            margin-top: 10px;
            color: #666;
            font-style: italic;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            background: #e9ecef;
            border-radius: 4px;
            display: none;
        }
        .link-container {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 5px;
        }
        .url-text {
            flex-grow: 1;
            word-break: break-all;
            padding: 8px;
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        .btn-link {
            color: #28a745;
            font-weight: bold;
            text-decoration: none;
            cursor: pointer;
        }
        .btn-link:hover {
            text-decoration: underline;
        }
        .btn-copy {
            padding: 8px 12px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            white-space: nowrap;
            width: auto;
        }
        .btn-copy:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="form-group">
        <label for="txId">Mã Data TX ID:</label>
        <input type="text" id="txId" placeholder="Dán mã TX ID của file vào đây">
    </div>
    
    <button onclick="getFilenameAndGenerate()">Generate Link</button>
    
    <div id="statusBox" class="status"></div>
    
    <div id="resultBox" class="result">
        <label>Link tải trực tiếp (Bấm là tải / Copy để chèn vào web):</label>
        <div class="link-container">
            <div class="url-text">
                <span id="downloadLink" class="btn-link" onclick="triggerDownload()"></span>
            </div>
            <button id="copyBtn" class="btn-copy" onclick="copyToClipboard()">Copy</button>
        </div>
    </div>
</div>

<script>
let generatedUrl = "";
let targetFileName = "";

async function getFilenameAndGenerate() {
    var txId = document.getElementById('txId').value.trim();
    var statusBox = document.getElementById('statusBox');
    var resultBox = document.getElementById('resultBox');
    var downloadLink = document.getElementById('downloadLink');
    var copyBtn = document.getElementById('copyBtn');
    
    if (txId === "") {
        alert("Vui lòng nhập mã TX ID.");
        return;
    }
    
    statusBox.innerText = "Đang truy vấn dữ liệu tên file từ hệ thống Arweave...";
    resultBox.style.display = "none";
    copyBtn.innerText = "Copy";

    const query = {
        query: `
            query {
                transaction(id: "${txId}") {
                    tags {
                        name
                        value
                    }
                }
            }
        `
    };

    try {
        const response = await fetch('https://arweave.net/graphql', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(query)
        });

        const resData = await response.json();
        
        if (!resData.data || !resData.data.transaction) {
            throw new Error("Không tìm thấy giao dịch.");
        }

        const tags = resData.data.transaction.tags;
        
        // Quét chính xác tag chứa tên file bằng cách chuẩn hóa mọi ký tự về chữ thường
        const fileNameTag = tags.find(tag => 
            tag.name.toLowerCase() === 'file-name' || 
            tag.name.toLowerCase() === 'filename'
        );
        
        if (fileNameTag) {
            targetFileName = fileNameTag.value;
            statusBox.innerText = "Đã tìm thấy tên file gốc: " + targetFileName;
        } else {
            // Nếu không tìm thấy tag cụ thể, bốc dữ liệu từ metadata mặc định của cổng truyền tải
            targetFileName = "download_" + txId.substring(0, 6);
            statusBox.innerText = "Không thấy tag đặt tên riêng. File sẽ được lưu tạm dưới tên: " + targetFileName;
        }

        var encodedFileName = encodeURIComponent(targetFileName);
        generatedUrl = "https://arweave.net/raw/" + txId + "?filename=" + encodedFileName;
        
        downloadLink.innerText = generatedUrl;
        resultBox.style.display = "block";

    } catch (error) {
        statusBox.innerText = "Lỗi kết nối hoặc mã TX ID sai. Thử lại sau.";
        console.error(error);
    }
}

async function triggerDownload() {
    var statusBox = document.getElementById('statusBox');
    statusBox.innerText = "Đang tải dữ liệu và chuẩn bị file xuống máy...";
    
    try {
        const fileResponse = await fetch(generatedUrl);
        const blob = await fileResponse.blob();
        
        const tempLink = document.createElement('a');
        tempLink.href = window.URL.createObjectURL(blob);
        tempLink.setAttribute('download', targetFileName);
        document.body.appendChild(tempLink);
        tempLink.click();
        
        document.body.removeChild(tempLink);
        window.URL.revokeObjectURL(tempLink.href);
        statusBox.innerText = "Đã tải xong.";
    } catch (err) {
        statusBox.innerText = "Trình duyệt chặn tải trực tiếp. Vui lòng chuột phải vào link chọn Save Link As.";
        console.error(err);
    }
}

function copyToClipboard() {
    if (!generatedUrl) return;
    
    navigator.clipboard.writeText(generatedUrl).then(function() {
        var copyBtn = document.getElementById('copyBtn');
        copyBtn.innerText = "Copied!";
    }).catch(function(err) {
        alert("Không thể copy tự động, vui lòng bôi đen link để copy tay.");
    });
}
</script>

</body>
</html>
