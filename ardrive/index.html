<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arweave Direct Link & Copy Tool</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #f4f4f4;
        }
        .container {
            max-width: 650px;
            background: #fff;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input[type="text"] {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            padding: 10px 15px;
            background-color: #007bff;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
        }
        button:hover {
            background-color: #0056b3;
        }
        .status {
            margin-top: 10px;
            color: #666;
            font-style: italic;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            background: #e9ecef;
            border-radius: 4px;
            display: none;
        }
        .link-container {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 5px;
        }
        .url-text {
            flex-grow: 1;
            word-break: break-all;
            padding: 8px;
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        .btn-link {
            color: #28a745;
            font-weight: bold;
            text-decoration: none;
            cursor: pointer;
        }
        .btn-link:hover {
            text-decoration: underline;
        }
        .btn-copy {
            padding: 8px 12px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            white-space: nowrap;
            width: auto;
        }
        .btn-copy:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="form-group">
        <label for="fileTxId">Mã File TX ID (Copy File TX ID từ ArDrive):</label>
        <input type="text" id="fileTxId" placeholder="Dán mã File TX ID vào đây">
    </div>
    
    <button onclick="processArDriveFile()">Generate Link</button>
    
    <div id="statusBox" class="status"></div>
    
    <div id="resultBox" class="result">
        <label>Link tải trực tiếp (Bấm là tải / Copy để chèn vào web):</label>
        <div class="link-container">
            <div class="url-text">
                <span id="downloadLink" class="btn-link" onclick="triggerDownload()"></span>
            </div>
            <button id="copyBtn" class="btn-copy" onclick="copyToClipboard()">Copy</button>
        </div>
    </div>
</div>

<script>
let generatedUrl = "";
let targetFileName = "";

async function processArDriveFile() {
    var fileTxId = document.getElementById('fileTxId').value.trim();
    var statusBox = document.getElementById('statusBox');
    var resultBox = document.getElementById('resultBox');
    var downloadLink = document.getElementById('downloadLink');
    var copyBtn = document.getElementById('copyBtn');
    
    if (fileTxId === "") {
        alert("Vui lòng nhập mã File TX ID.");
        return;
    }
    
    statusBox.innerText = "Đang đọc metadata để lấy tên file gốc và mã data...";
    resultBox.style.display = "none";
    copyBtn.innerText = "Copy";

    try {
        // Đọc trực tiếp nội dung JSON metadata lưu trên File TX ID của ArDrive
        const response = await fetch('https://arweave.net/' + fileTxId + 'download=true');
        if (!response.ok) throw new Error("Không thể tải metadata của File ID này.");
        
        const metadata = await response.json();
        
        // Trích xuất chính xác tên file và mã dữ liệu thô từ cấu trúc JSON của ArDrive
        if (metadata && metadata.name && metadata.dataTxId) {
            targetFileName = metadata.name;
            var dataTxId = metadata.dataTxId;
            
            statusBox.innerText = "Đã tìm thấy file gốc: " + targetFileName;
            
            var encodedFileName = encodeURIComponent(targetFileName);
            generatedUrl = "https://arweave.net/raw/" + dataTxId + "?filename=" + encodedFileName;
            
            downloadLink.innerText = generatedUrl;
            resultBox.style.display = "block";
        } else {
            statusBox.innerText = "Định dạng JSON của ArDrive không hợp lệ hoặc mã nhập vào không phải File TX ID.";
        }
    } catch (error) {
        statusBox.innerText = "Lỗi đọc dữ liệu. Đảm bảo bạn đã nhập đúng File TX ID (không phải Data TX ID).";
        console.error(error);
    }
}

async function triggerDownload() {
    var statusBox = document.getElementById('statusBox');
    statusBox.innerText = "Đang kết nối luồng tải xuống...";
    
    try {
        const fileResponse = await fetch(generatedUrl);
        if (!fileResponse.ok) throw new Error("Tải file thất bại");
        const blob = await fileResponse.blob();
        
        const tempLink = document.createElement('a');
        tempLink.href = window.URL.createObjectURL(blob);
        tempLink.setAttribute('download', targetFileName);
        document.body.appendChild(tempLink);
        tempLink.click();
        
        document.body.removeChild(tempLink);
        window.URL.revokeObjectURL(tempLink.href);
        statusBox.innerText = "Đã tải xong file: " + targetFileName;
    } catch (err) {
        statusBox.innerText = "Trình duyệt chặn tải trực tiếp. Hãy chuột phải vào link chọn Save Link As.";
        console.error(err);
    }
}

function copyToClipboard() {
    if (!generatedUrl) return;
    
    navigator.clipboard.writeText(generatedUrl).then(function() {
        var copyBtn = document.getElementById('copyBtn');
        copyBtn.innerText = "Copied!";
    }).catch(function(err) {
        alert("Lỗi sao chép.");
    });
}
</script>

</body>
</html>
