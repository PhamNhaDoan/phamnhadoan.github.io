<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arweave Direct Link Generator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #f4f4f4;
        }
        .container {
            max-width: 600px;
            background: #fff;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input[type="text"] {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            padding: 10px 15px;
            background-color: #007bff;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
        }
        button:hover {
            background-color: #0056b3;
        }
        .status {
            margin-top: 10px;
            color: #666;
            font-style: italic;
        }
        .result {
            margin-top: 20px;
            padding: 10px;
            background: #e9ecef;
            border-radius: 4px;
            display: none;
            word-break: break-all;
        }
        a {
            color: #28a745;
            font-weight: bold;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="form-group">
        <label for="txId">Mã Data TX ID:</label>
        <input type="text" id="txId" placeholder="Dán mã TX ID của file vào đây">
    </div>
    
    <button onclick="getFilenameAndGenerate()">Generate Link</button>
    
    <div id="statusBox" class="status"></div>
    
    <div id="resultBox" class="result">
        <p>Link tải trực tiếp, đúng tên file gốc:</p>
        <a id="downloadLink" href="#" target="_blank"></a>
    </div>
</div>

<script>
async function getFilenameAndGenerate() {
    var txId = document.getElementById('txId').value.trim();
    var statusBox = document.getElementById('statusBox');
    var resultBox = document.getElementById('resultBox');
    var downloadLink = document.getElementById('downloadLink');
    
    if (txId === "") {
        alert("Vui lòng nhập mã TX ID.");
        return;
    }
    
    statusBox.innerText = "Đang truy vấn tên file gốc từ Arweave...";
    resultBox.style.display = "none";

    // Cấu trúc query GraphQL để tìm thẻ File-Name trong metadata của TX ID
    const query = {
        query: `
            query {
                transaction(id: "${txId}") {
                    tags {
                        name
                        value
                    }
                }
            }
        `
    };

    try {
        const response = await fetch('https://arweave.net/graphql', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(query)
        });

        const resData = await response.json();
        const tags = resData.data.transaction.tags;
        
        // Tìm đúng tag tên file do ArDrive tự ghi khi up lên
        const fileNameTag = tags.find(tag => tag.name.toLowerCase() === 'file-name');
        
        if (!fileNameTag) {
            statusBox.innerText = "Không tìm thấy siêu dữ liệu tên file. Thử tạo link mặc định.";
            var finalUrl = "https://arweave.net/raw/" + txId;
            downloadLink.href = finalUrl;
            downloadLink.innerText = finalUrl;
            resultBox.style.display = "block";
            return;
        }

        var originFileName = fileNameTag.value;
        statusBox.innerText = "Đã tìm thấy file: " + originFileName;

        // Ráp tự động vào tham số đường dẫn để ép trình duyệt nhận diện đúng tên gốc
        var encodedFileName = encodeURIComponent(originFileName);
        var finalUrl = "https://arweave.net/raw/" + txId + "?filename=" + encodedFileName;
        
        downloadLink.href = finalUrl;
        downloadLink.innerText = finalUrl;
        resultBox.style.display = "block";

    } catch (error) {
        statusBox.innerText = "Lỗi kết nối mạng Arweave. Vui lòng kiểm tra lại mã TX ID.";
        console.error(error);
    }
}
</script>

</body>
</html>
