<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Góc Phẫu Thuật Truyện - Xóa Truyện</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@500;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f7f5f0;
            --primary-green: #556b2f;
            --earth-orange: #d97443;
            --text-dark: #2f3542;
        }
        body { font-family: 'Nunito', sans-serif; background-color: var(--bg-color); color: var(--text-dark); padding: 40px 20px; }
        .main-wrapper { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 20px; border: 3px dotted #a4b0be; }
        h1 { font-family: 'Comfortaa', cursive; color: var(--primary-green); text-align: center; }
        .admin-box { margin-top: 30px; padding: 20px; background: #fffaf0; border-radius: 12px; border: 1px solid #ddd; }
        input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box; }
        button { width: 100%; padding: 10px; border: none; border-radius: 5px; cursor: pointer; color: white; font-weight: bold; margin-top: 10px; }
        .btn-delete { background-color: #ff4757; }
        .btn-delete-latest { background-color: var(--earth-orange); }
        .config-box { border-bottom: 2px solid #eee; padding-bottom: 20px; margin-bottom: 20px; }
    </style>

    <div class="admin-box">

    <div class="admin-box">
        <h3>Xóa truyện gần nhất</h3>
        <button onclick="deleteLatest()" class="btn-delete-latest">Xóa truyện gần nhất</button>
    </div>
</div>

</html>
