    function displayReviews(data) {
        const grid = document.getElementById('reviewGrid');
        if (!grid) return;
        grid.innerHTML = '';
        
        const validData = data.filter(item => item && item.ten);
        
        if (validData.length === 0) {
            grid.innerHTML = `<div style="grid-column: 1/-1; text-align:center; color:#999; padding: 40px;">Không thấy bài review cần tìm rồi nàng ơi...</div>`;
            return;
        }

        validData.forEach(item => {
            const row = `
                <div class="review-card">
                    <div class="book-img-box">
                        <img src="${item.hinhAnh || 'img/default.jpg'}" class="book-img" alt="${item.ten}">
                    </div>
                    <div class="book-info">
                        <h3 class="book-title">${item.ten || 'Chưa rõ tên'}</h3>
                        <div class="book-meta">
                            <strong>Tác giả:</strong> ${item.tacGia || '-'}<br>
                            <strong>Nhà edit:</strong> ${item.nhaEdit || '-'}
                        </div>
                        <div class="review-text">${item.review || 'Chưa có bài cảm nhận...'}</div>
                        <a href="${item.linkDoc || '#'}" target="_blank" class="btn-read">Đọc Ngay</a>
                    </div>
                </div>
            `;
            grid.innerHTML += row;
        });
    }

    function initReviews() {
        let reviews = [...dataReviews];
        reviews.sort((a, b) => b.id - a.id);
        displayReviews(reviews);

        const searchBar = document.getElementById('searchBar');
        if (searchBar) {
            searchBar.addEventListener('input', (e) => {
                const keyword = e.target.value.toLowerCase().trim();
                const filtered = reviews.filter(item => 
                    item && (
                        (item.ten && item.ten.toLowerCase().includes(keyword)) || 
                        (item.tacGia && item.tacGia.toLowerCase().includes(keyword)) || 
                        (item.nhaEdit && item.nhaEdit.toLowerCase().includes(keyword))
                    )
                );
                displayReviews(filtered);
            });
        }
    }

    window.onload = initReviews;
</script>
